name: Update and Publish SDK

on:
  repository_dispatch:
    types: [update-sdk]
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine datamodel-code-generator httpx

      - name: Fetch current version from swagger
        id: fetch-version
        run: |
          SWAGGER_URL="https://api.linkbreakers.com/internal/openapi/api/v1/api.swagger.json"
          NEW_VERSION=$(curl -s "$SWAGGER_URL" | python -c "import sys, json; print(json.load(sys.stdin)['info']['version'])")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Swagger version: $NEW_VERSION"

      - name: Read current OPENAPI_VERSION
        id: current-version
        run: |
          if [ -f OPENAPI_VERSION ]; then
            CURRENT_VERSION=$(cat OPENAPI_VERSION)
          else
            CURRENT_VERSION="0.0.0"
          fi
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $CURRENT_VERSION"

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.fetch-version.outputs.new_version }}" == "${{ steps.current-version.outputs.current_version }}" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "✅ Versions match. No update needed."
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "🔄 Version changed: ${{ steps.current-version.outputs.current_version }} → ${{ steps.fetch-version.outputs.new_version }}"
          fi

      - name: Generate SDK models
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          # Remove existing generated code (except __init__.py)
          find linkbreakers -mindepth 1 ! -name '__init__.py' -delete || true

          # Generate Pydantic models from OpenAPI spec using datamodel-code-generator
          datamodel-codegen \
            --url https://api.linkbreakers.com/internal/openapi/api/v1/api.swagger.json \
            --output linkbreakers/models.py \
            --output-model-type pydantic_v2.BaseModel \
            --field-constraints \
            --use-standard-collections

          echo "✅ Models generated successfully"

      - name: Create SDK client wrapper
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          cat > linkbreakers/client.py << 'EOF'
          """Linkbreakers API Client"""
          from typing import Any, Dict, Optional
          import httpx


          class LinkebreakersClient:
              """HTTP client for Linkbreakers API"""

              def __init__(
                  self,
                  api_key: str,
                  base_url: str = "https://api.linkbreakers.com",
                  timeout: float = 30.0
              ):
                  self.api_key = api_key
                  self.base_url = base_url
                  self.timeout = timeout
                  self._client = httpx.Client(
                      base_url=base_url,
                      headers={
                          "Authorization": f"Bearer {api_key}",
                          "Content-Type": "application/json",
                      },
                      timeout=timeout,
                  )

              def request(
                  self,
                  method: str,
                  path: str,
                  **kwargs: Any
              ) -> httpx.Response:
                  """Make an HTTP request to the API"""
                  return self._client.request(method, path, **kwargs)

              def get(self, path: str, **kwargs: Any) -> httpx.Response:
                  """Make a GET request"""
                  return self.request("GET", path, **kwargs)

              def post(self, path: str, **kwargs: Any) -> httpx.Response:
                  """Make a POST request"""
                  return self.request("POST", path, **kwargs)

              def put(self, path: str, **kwargs: Any) -> httpx.Response:
                  """Make a PUT request"""
                  return self.request("PUT", path, **kwargs)

              def patch(self, path: str, **kwargs: Any) -> httpx.Response:
                  """Make a PATCH request"""
                  return self.request("PATCH", path, **kwargs)

              def delete(self, path: str, **kwargs: Any) -> httpx.Response:
                  """Make a DELETE request"""
                  return self.request("DELETE", path, **kwargs)

              def close(self) -> None:
                  """Close the HTTP client"""
                  self._client.close()

              def __enter__(self):
                  return self

              def __exit__(self, *args):
                  self.close()


          class AsyncLinkebreakersClient:
              """Async HTTP client for Linkbreakers API"""

              def __init__(
                  self,
                  api_key: str,
                  base_url: str = "https://api.linkbreakers.com",
                  timeout: float = 30.0
              ):
                  self.api_key = api_key
                  self.base_url = base_url
                  self.timeout = timeout
                  self._client = httpx.AsyncClient(
                      base_url=base_url,
                      headers={
                          "Authorization": f"Bearer {api_key}",
                          "Content-Type": "application/json",
                      },
                      timeout=timeout,
                  )

              async def request(
                  self,
                  method: str,
                  path: str,
                  **kwargs: Any
              ) -> httpx.Response:
                  """Make an HTTP request to the API"""
                  return await self._client.request(method, path, **kwargs)

              async def get(self, path: str, **kwargs: Any) -> httpx.Response:
                  """Make a GET request"""
                  return await self.request("GET", path, **kwargs)

              async def post(self, path: str, **kwargs: Any) -> httpx.Response:
                  """Make a POST request"""
                  return await self.request("POST", path, **kwargs)

              async def put(self, path: str, **kwargs: Any) -> httpx.Response:
                  """Make a PUT request"""
                  return await self.request("PUT", path, **kwargs)

              async def patch(self, path: str, **kwargs: Any) -> httpx.Response:
                  """Make a PATCH request"""
                  return await self.request("PATCH", path, **kwargs)

              async def delete(self, path: str, **kwargs: Any) -> httpx.Response:
                  """Make a DELETE request"""
                  return await self.request("DELETE", path, **kwargs)

              async def close(self) -> None:
                  """Close the HTTP client"""
                  await self._client.aclose()

              async def __aenter__(self):
                  return self

              async def __aexit__(self, *args):
                  await self.close()
          EOF

          echo "✅ Client wrapper created"

      - name: Update version files
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          NEW_VERSION="${{ steps.fetch-version.outputs.new_version }}"

          # Update OPENAPI_VERSION file
          echo "$NEW_VERSION" > OPENAPI_VERSION

          # Update __version__ in __init__.py
          sed -i "s/__version__ = '.*'/__version__ = '$NEW_VERSION'/" linkbreakers/__init__.py

          echo "✅ Version files updated to $NEW_VERSION"

      - name: Build distribution
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          python setup.py sdist bdist_wheel
          echo "✅ Distribution built"

      - name: Configure Git
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          NEW_VERSION="${{ steps.fetch-version.outputs.new_version }}"

          git add .
          git commit -m "chore: update SDK to API version $NEW_VERSION"

          echo "✅ Changes committed"

      - name: Create and push tag
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          NEW_VERSION="${{ steps.fetch-version.outputs.new_version }}"

          git tag "v$NEW_VERSION"
          git push origin main
          git push origin "v$NEW_VERSION"

          echo "✅ Tag v$NEW_VERSION created and pushed"

      - name: Publish to PyPI
        if: steps.compare.outputs.needs_update == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          twine upload dist/*
          echo "✅ Published linkbreakers==${{ steps.fetch-version.outputs.new_version }} to PyPI"

      - name: Summary
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          echo "🎉 SDK successfully updated and published!"
          echo "Version: ${{ steps.fetch-version.outputs.new_version }}"
          echo "Package: https://pypi.org/project/linkbreakers/"
